    <style>
        .container {
            width: 100%;
            padding-right: var(--bs-gutter-x, 0.75rem);
            padding-left: var(--bs-gutter-x, 0.75rem);
            margin-right: auto;
            margin-left: auto;
        }

        @media (min-width: 576px) {
            .container {
                max-width: 540px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 720px;
            }
        }

        @media (min-width: 992px) {
            .container {
                max-width: 960px;
            }
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 1140px;
            }
        }

        @media (min-width: 1400px) {
            .container {
                max-width: 1320px;
            }
        }

        .row {
            --bs-gutter-x: 5rem;
            --bs-gutter-y: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            margin-right: calc(var(--bs-gutter-x) * -.5);
            margin-left: calc(var(--bs-gutter-x) * -.5);
        }

        .row > * {
            box-sizing: border-box;
            flex-shrink: 0;
            width: 100%;
            max-width: 100%;
            padding-right: calc(var(--bs-gutter-x) * .5);
            padding-left: calc(var(--bs-gutter-x) * .5);
            padding-top: var(--bs-gutter-y);
            padding-bottom: var(--bs-gutter-y);
        }

        .col {
            flex: 1 0 0%;
        }

        .w-100 {
            width: 100%;
        }

        .m-auto {
            margin: 0 auto;
        }

        a {
            color: black;
        }

        svg.posts:hover,
        svg.posts:active {
            stroke: #25c2a0;
            fill: #25c2a0;

        svg.storybook:hover .hover,
        svg.storybook:active .hover {
            stroke: #FF4785;

        svg.open-rpc:hover,

        svg.vk:hover,
